name: Deploy to Custom Hosting (FTP)

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Usage Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build
        env:
          CI: false

      - name: 📂 Sync files to Hosting (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/ # ⚠️ CAMBIAR ESTO si tu web está en una subcarpeta o en la raíz
          local-dir: ./dist/
          dangerous-clean-slate: true # ⚠️ BORRA archivos remotos que no estén en local (cuidado)
